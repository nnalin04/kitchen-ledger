name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, inventory-service, finance-service, staff-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test ${{ matrix.service }}
        run: cd services/${{ matrix.service }} && mvn test -q
      - name: Check coverage
        run: cd services/${{ matrix.service }} && mvn jacoco:check -q

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ai-service, report-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: cd services/${{ matrix.service }} && pip install -r requirements.txt
      - name: Test ${{ matrix.service }}
        run: cd services/${{ matrix.service }} && pytest --cov --cov-fail-under=80 -q

  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, notification-service, file-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd services/${{ matrix.service }} && npm ci
      - run: cd services/${{ matrix.service }} && npx vitest run --coverage

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: cd apps/web && npx tsc --noEmit
      - run: cd apps/web && npx vitest run
