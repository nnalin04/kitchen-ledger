name: Run Database Migrations

# Reusable workflow — called by deploy workflows before container rollout.
# Java services (Spring Boot + Flyway) run migrations automatically on startup,
# so this workflow only explicitly migrates the Python services via Alembic.
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      DATABASE_URL:
        required: true
      RABBITMQ_URL:
        required: false
      REDIS_URL:
        required: false

jobs:
  # ── Python services: explicit Alembic migration ───────────────────────────
  migrate-python:
    name: Alembic migrate ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      # Migrate sequentially to avoid concurrent DDL locks
      max-parallel: 1
      matrix:
        service: [ai-service, report-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Alembic + driver
        run: pip install alembic psycopg2-binary

      - name: Run migrations for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Java services: Flyway runs on startup — document the check here ───────
  # Spring Boot's spring.flyway.enabled=true (default) runs migrations when
  # the container starts. This step validates the migration scripts are present
  # and well-formed without executing against the production DB.
  validate-flyway:
    name: Validate Flyway scripts (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, inventory-service, finance-service, staff-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Validate migration scripts
        working-directory: services/${{ matrix.service }}
        # flyway:validate checks scripts are well-formed without executing them
        run: mvn flyway:validate --batch-mode
        env:
          # Flyway needs a DB to validate against; use an in-memory H2 substitute
          # just for syntax checking, or skip validation if DB unavailable
          SPRING_FLYWAY_ENABLED: 'false'
