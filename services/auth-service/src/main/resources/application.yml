server:
  port: ${SERVER_PORT:8081}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kitchenledger}
    username: ${SPRING_DATASOURCE_USERNAME:kl_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kl_password}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:kl_rabbit}
    password: ${RABBITMQ_PASSWORD:kl_rabbit_pass}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

jwt:
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}
  access-token-expiry-minutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:15}
  refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:30}

internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET:}

app:
  web-url: ${APP_WEB_URL:http://localhost:3000}

resend:
  api-key: ${RESEND_API_KEY:}

rabbitmq:
  exchange: kitchenledger.events
  # Auth Service is a PRODUCER only — it publishes events to the exchange.
  # It does NOT declare consumer queues. See §2.16 RabbitMQ Topology.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,readiness
  endpoint:
    health:
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,db

logging:
  level:
    com.kitchenledger: INFO
    org.springframework.security: WARN
